    // --- SCENE 4: PAUSE SCREEN ---
    class ScenePause extends Phaser.Scene {
        constructor() {
            super({ key: 'ScenePause' });
        }

        create() {
            const width = this.scale.width;
            const height = this.scale.height;

            this.pilihanIndex = 0;
            this.terakhirPindahMundur = 0;

            // Membuat latar belakang hitam transparan agar game di belakangnya masih sedikit terlihat
            this.add.rectangle(0, 0, width, height, 0x000000, 0.6).setOrigin(0);

            // Teks Keterangan Pause & Skor Saat Ini
            this.add.text(width / 2, height / 2 - 120, 'GAME PAUSED', {
                fontSize: '40px',
                fill: '#ffffff',
                fontStyle: 'bold',
                fontFamily: 'Arial'
            }).setOrigin(0.5);

            this.add.text(width / 2, height / 2 - 60, 'SKOR ANDA: ' + skor, {
                fontSize: '20px',
                fill: '#00ff00',
                fontStyle: 'bold',
                fontFamily: 'Arial'
            }).setOrigin(0.5);

            // Membuat Tombol Menu
            this.tombolLanjut = this.add.text(width / 2, height / 2 + 20, 'LANJUTKAN', {
                fontSize: '20px',
                fill: '#ffffff',
                fontStyle: 'bold',
                fontFamily: 'Arial',
                backgroundColor: '#333333',
                padding: { x: 15, y: 8 }
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });

            this.tombolMenu = this.add.text(width / 2, height / 2 + 80, 'KEMBALI KE MENU', {
                fontSize: '20px',
                fill: '#ffffff',
                fontStyle: 'bold',
                fontFamily: 'Arial',
                backgroundColor: '#333333',
                padding: { x: 15, y: 8 }
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });

            // Navigasi Menggunakan Mouse
            this.tombolLanjut.on('pointerover', () => { this.pilihanIndex = 0; this.updateVisualTombol(); });
            this.tombolLanjut.on('pointerdown', () => this.bukaKembaliGame());

            this.tombolMenu.on('pointerover', () => { this.pilihanIndex = 1; this.updateVisualTombol(); });
            this.tombolMenu.on('pointerdown', () => this.keluarKeMenuUtama());

            // Navigasi Gamepad (Sistem Sekali Tekan)
            this.input.gamepad.on('down', (pad, button) => {
                
                // 1. Logika Eksekusi Tombol B (Konfirmasi Pilihan)
                if (button.index === 1) { 
                    if (this.pilihanIndex === 0) {
                        // PERBAIKAN: Pastikan namanya 'bukaKembaliGame', bukan 'bukaKemulaiGame'
                        this.bukaKembaliGame();
                    } else if (this.pilihanIndex === 1) {
                        // PERBAIKAN: Bersihkan listener secara instan SEBELUM pindah scene
                        this.input.gamepad.removeAllListeners();
                        this.keluarKeMenuUtama();
                    }
                }
                
                // 2. Logika Eksekusi Tombol Menu/Start (Toggle Kembali ke Game)
                if (button.index === 9) {
                    if (this.time.now - this.sys.settings.data.timeStarted > 300) {
                        this.bukaKembaliGame();
                    }
                }
            });

            // Pengaman pembersihan listener stik saat scene ditutup
            this.events.once('shutdown', () => {
                this.input.gamepad.removeAllListeners();
            });

            this.updateVisualTombol();
            
            // --- TAMBAHKAN REGISTER TOMBOL ESC DI SINI ---
            this.tombolEsc = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);

            // Pengaman pembersihan listener stik saat scene ditutup
            this.events.once('shutdown', () => {
                this.input.gamepad.removeAllListeners();
            });

            this.updateVisualTombol();
        }

        updateVisualTombol() {
            if (this.pilihanIndex === 0) {
                this.tombolLanjut.setStyle({ fill: '#ffffff', backgroundColor: '#00ffff' });
                this.tombolMenu.setStyle({ fill: '#ffffff', backgroundColor: '#333333' });
            } else {
                this.tombolLanjut.setStyle({ fill: '#ffffff', backgroundColor: '#333333' });
                this.tombolMenu.setStyle({ fill: '#333333', backgroundColor: '#ffffff' });
            }
        }

        bukaKembaliGame() {
            // Bersihkan seluruh listener gamepad milik scene pause terlebih dahulu
            this.input.gamepad.removeAllListeners();
            
            // Tutup scene pause ini, lalu bangunkan kembali SceneGame
            this.scene.stop();
            this.scene.resume('SceneGame');
        }

        keluarKeMenuUtama() {
            // Matikan scene pause, matikan total scene game yang sedang berjalan, lalu buka menu utama
            this.scene.stop();
            this.scene.stop('SceneGame');
            this.scene.start('SceneMenu');
        }

        update(time) {
            // --- 1. CEK APABILA TOMBOL ESC KEYBOARD DITEKAN ---
            if (Phaser.Input.Keyboard.JustDown(this.tombolEsc)) {
                this.bukaKembaliGame();
                return;
            }

            let pad = this.input.gamepad.total ? this.input.gamepad.getPad(0) : null;
            if (!pad) return;

            let analogKananY = pad.axes[3].value;
            const AMBANG_BATAS = 0.5;

            if (time > this.terakhirPindahMundur) {
                if (analogKananY > AMBANG_BATAS) {
                    this.pilihanIndex = 1;
                    this.updateVisualTombol();
                    this.terakhirPindahMundur = time + 250;
                } else if (analogKananY < -AMBANG_BATAS) {
                    this.pilihanIndex = 0;
                    this.updateVisualTombol();
                    this.terakhirPindahMundur = time + 250;
                }
            }
        }
    }

    // --- SIKLUS UTAMA ENGINE ---
    const config = {
        type: Phaser.AUTO,

    // --- FUNGSI ASISTEN UNTUK MENGHITUNG ARAH DORONGAN ---
    function bikinKnockback(player, enemy, kekuatan) {
        // Hitung sudut arah dari musuh ke posisi player
        let sudut = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
        
        // Tembakkan kecepatan fisika player ke arah berlawanan dari posisi musuh
        player.setVelocityX(Math.cos(sudut) * kekuatan);
        player.setVelocityY(Math.sin(sudut) * kekuatan);
    }
