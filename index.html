<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hack and Slash</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { box-shadow: 0 0 20px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<script>
    // --- SCENE 1: MENU UTAMA (START SCREEN) ---
    class SceneMenu extends Phaser.Scene {
        constructor() {
            super({ key: 'SceneMenu' });
        }

        preload() {
            // Memuat aset minimal jika diperlukan
        }

        create() {
            const width = this.scale.width;
            const height = this.scale.height;

            this.add.text(width / 2, height / 2 - 80, 'MAIN KAN', {
                fontSize: '48px',
                fill: '#ffffff',
                fontStyle: 'bold',
                fontFamily: 'Arial'
            }).setOrigin(0.5);

            let tombolMulai = this.add.text(width / 2, height / 2 + 20, 'MULAI GAME', {
                fontSize: '24px',
                fill: '#00ff00',
                fontStyle: 'bold',
                fontFamily: 'Arial',
                backgroundColor: '#333333',
                padding: { x: 20, y: 10 }
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });

            tombolMulai.on('pointerover', () => tombolMulai.setStyle({ fill: '#ffffff', backgroundColor: '#00ff00' }));
            tombolMulai.on('pointerout', () => tombolMulai.setStyle({ fill: '#00ff00', backgroundColor: '#333333' }));
            tombolMulai.on('pointerdown', () => this.scene.start('SceneGame'));

            // --- PERBAIKAN GAMEPAD DI MENU: GUNAKAN EVENT LISTENER SEKALI TEKAN ---
            this.input.gamepad.on('down', (pad, button) => {
                // Tombol B (indeks 1) digunakan untuk memulai game dari menu utama
                if (button.index === 1) {
                    this.input.gamepad.removeAllListeners(); // Bersihkan listener sebelum pindah scene
                    this.scene.start('SceneGame');
                }
            });

            // Pastikan listener dibersihkan saat scene ditutup
            this.events.once('shutdown', () => {
                this.input.gamepad.removeAllListeners();
            });
        }
        
        // --- FUNGSI UPDATE DI SCENEMENU DIHAPUS TOTAL AGAR TIDAK BENTROK ---
    }

    // --- SCENE 2: PERMAINAN (GAMEPLAY) ---
    class SceneGame extends Phaser.Scene {
        constructor() {
            super({ key: 'SceneGame' });
        }

        preload() {
            // Mengambil gambar aset gratis dari internet sebagai contoh placeholder
            this.load.image('lantai', 'assets/land/tanah.jpg'); // Ganti dengan URL gambar lantai Anda nanti
            this.load.image('karakter', 'assets/character/Subjek.png');
            this.load.image('batu', 'assets/land/Subjek.png');
            this.load.image('musuh', 'assets/enemy/Subjek.png');
        }

        create() {
            // --- TAMBAHKAN BARIS RESET INI DI PALING ATAS CREATE SCENEGAME ---
            hp = 60;   // Sesuaikan dengan nyawa awal yang Anda inginkan (60)
            skor = 0;

            this.sudutBidikanTerakhir = 0;

            isKnockback = false;
            isAttacking = false;

            this.isDashing = false;
            this.isAimingSkill = false;
            this.waktuMulaiTekanSkill = 0;
            this.skillBisaDigunakan = true;
            this.waktuSelesaiCooldown = 0;
            this.timerSelesaiBilasTanda = null;
            this.waktuSelesaiDarahBiru = 0;

            this.tombolSkill = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.E);
            this.indikatorSkill = this.add.graphics();
            this.indikatorSkill.setDepth(997);

            // Variabel Ultimate (Terpisah dari Dash)
            this.isUltimating = false;
            this.isAimingUlt = false;
            this.waktuMulaiTekanUlt = 0;
            this.ultBisaDigunakan = true; // Cooldown terpisah

            // Input Ultimate
            this.tombolUlti = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Q);
            this.indikatorUlt = this.add.graphics();
            this.indikatorUlt.setDepth(997);

            // Satu status cooldown BERSAMA untuk kedua varian ultimate
            this.ultReady = true;

            this.isUltCancelled = false;
            this.isSkillCancelled = false; // Tambahkan di bagian inisialisasi variabel
            this.tombolBatalC = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.C);

            // 1. Mengatur batas luas dunia game agar karakter tidak bisa jalan menembus batas map
            this.physics.world.setBounds(0, 0, MAP_WIDTH, MAP_HEIGHT);

            // 2. Membuat background bermotif/pattern (TileSprite) yang otomatis mengulang keseluruh map
            // Parameter: (X, Y, Lebar_Map, Tinggi_Map, Kunci_Aset)
            let background = this.add.tileSprite(0, 0, MAP_WIDTH, MAP_HEIGHT, 'lantai');
            background.setOrigin(0, 0); // Mengatur titik tumpu gambar di pojok kiri atas

            batuGroup = this.physics.add.staticGroup();

            this.time.addEvent({
                delay: 200, 
                loop: true,
                callback: () => {
                    if (!enemyGroup) return; // Proteksi tambahan
                    enemyGroup.getChildren().forEach((enemy) => {
                        // Jika knockback, skip AI
                        if (enemy.getData('sedangKnockback')) {
                            enemy.setVelocityX(enemy.body.velocity.x * 0.9);
                            enemy.setVelocityY(enemy.body.velocity.y * 0.9);
                            return; 
                        }

                        // Jika musuh sedang dalam animasi serangan/jeda, biarkan dia tetap diam
                        if (enemy.getData('sedangEksekusiSerangan')) {
                            enemy.setVelocity(0);
                            return;
                        }

                        let jarak = Phaser.Math.Distance.Between(enemy.x, enemy.y, player.x, player.y);  

                        // Ambil statistik musuh spesifik dari datanya sendiri
                        let batasDeteksi = enemy.getData('radiusDeteksi');
                        let batasSerang = enemy.getData('radiusSerang');
                        let speedMusuh = enemy.getData('kecepatanKustom'); // Sekarang dinamis!

                        // LOGIKA PERILAKU:
                        if (jarak <= batasSerang) {
                            // 1. Jika di dalam radius serang: Berhenti, lalu panggil fungsi serangan
                            enemy.setVelocity(0);
                            // PERBAIKAN: Cek tipe musuh untuk memanggil fungsi serangan yang benar
                            let tipe = enemy.getData('tipe');
                            if (tipe === 'big') {
                                this.prosesSeranganBig(player, enemy);
                            } else {
                                this.prosesSeranganKroco(player, enemy);
                            }
                        } else if (jarak < batasDeteksi) {
                            // 2. Jika di dalam radius deteksi tapi luar radius serang: KEJAR
                            this.physics.moveToObject(enemy, player, speedMusuh);
                            enemy.setFlipX(player.x < enemy.x);
                        } else {
                            // 3. Jika terlalu jauh: Diam
                            enemy.setVelocity(0);
                        }
                        
                        // Update teks HP
                        let tks = enemy.getData('hpTextObject');
                        if (tks) tks.setPosition(enemy.x, enemy.y - 40);
                    });
                }
            });

            // ATUR JUMLAH BATU DI SINI (Ubah angka ini sesuai selera Anda)
            const JUMLAH_BATU = 440; 

            for (let i = 0; i < JUMLAH_BATU; i++) {
                // Mengacak posisi X dan Y di sepanjang ukuran MAP_WIDTH dan MAP_HEIGHT
                // Ditambahkan margin sedikit (misal 100px) agar tidak terlalu mepet di ujung paling luar map
                let randomX = Phaser.Math.Between(80, MAP_WIDTH - 80);
                let randomY = Phaser.Math.Between(80, MAP_HEIGHT - 80);

                // Membuat objek batu di koordinat acak tersebut
                let batu = batuGroup.create(randomX, randomY, 'batu');

                // OPsional: Jika ingin ukuran batunya diatur atau diperbesar lewat kode
                batu.setDisplaySize(64, 48); 

                // Memperbarui badan fisika batu agar pas dengan ukuran display yang baru dikustomisasi
                batu.refreshBody(); 
            }

            // 3. Menaruh karakter di tengah-tengah map yang luas tersebut
            player = this.physics.add.image(MAP_WIDTH / 2, MAP_HEIGHT / 2, 'karakter');
            player.setCollideWorldBounds(true); // Karakter akan tertahan di batas luar MAP_WIDTH & MAP_HEIGHT
            this.physics.add.collider(player, batuGroup);

            // 4. Mengatur Kamera
            // Menyuruh kamera utama untuk mengikuti pergerakan karakter
            this.cameras.main.startFollow(player, true, 0.05, 0.05);
            
            // Membatasi kamera agar tidak nge-scroll keluar dari batas luas map
            this.cameras.main.setBounds(0, 0, MAP_WIDTH, MAP_HEIGHT);

            // 5. Mengaktifkan keyboard
            cursors = this.input.keyboard.createCursorKeys();

            // Mengatur kamera untuk mengikuti player
            this.cameras.main.startFollow(player, true, 0.05, 0.05);
            this.cameras.main.setBounds(0, 0, MAP_WIDTH, MAP_HEIGHT);

            // 1. Membuat kelompok musuh dinamis (bisa bergerak)
            enemyGroup = this.physics.add.group();

            // Daftarkan tombol WASD selain tombol panah bawaan
            this.wasd = this.input.keyboard.addKeys({
                up: Phaser.Input.Keyboard.KeyCodes.W,
                down: Phaser.Input.Keyboard.KeyCodes.S,
                left: Phaser.Input.Keyboard.KeyCodes.A,
                right: Phaser.Input.Keyboard.KeyCodes.D
            });

            // =================================================================
            // --- REVISI: AMBIL REFERENSI KAMERA UTAMA UNTUK MENCEGAH INFINITE LOOP ---
            // =================================================================
            let kameraUtama = this.cameras.main; 

            for (let i = 0; i < JUMLAH_SPAWN_TITIK; i++) {
                let pusatX = Phaser.Math.Between(200, MAP_WIDTH - 200);
                let pusatY = Phaser.Math.Between(200, MAP_HEIGHT - 200);
                let jumlahMusuhDiTitikIni = Phaser.Math.Between(2, 4);

                for (let j = 0; j < jumlahMusuhDiTitikIni; j++) {
                    let spawnX = pusatX + Phaser.Math.Between(-40, 40);
                    let spawnY = pusatY + Phaser.Math.Between(-40, 40);
                    let beradaDiDalamLayar = true;

                    let percobaan = 0;
                    while (beradaDiDalamLayar && percobaan < 20) { // <--- AWAL TRAP LOOPING TANPA BATAS
                        spawnX = Phaser.Math.Between(200, MAP_WIDTH - 200);
                        spawnY = Phaser.Math.Between(200, MAP_HEIGHT - 200);

                        // MASALAH KRUSIAL: Variabel "kameraUtama" membaca properti .worldView dari objek yang tidak valid / tidak sinkron pada frame pertama create()
                        let diDalamX = (spawnX >= kameraUtama.worldView.x && spawnX <= kameraUtama.worldView.x + kameraUtama.worldView.width);
                        let diDalamY = (spawnY >= kameraUtama.worldView.y && spawnY <= kameraUtama.worldView.y + kameraUtama.worldView.height);

                        if (!diDalamX || !diDalamY) {
                            beradaDiDalamLayar = false; // <--- Sinyal ini tidak pernah terpicu!
                        }
                        percobaan++;
                    } // <--- AKHIR TRAP

                    // Ganti baris penentuan tipe musuh menjadi ini:
                    let angkaAcak = Phaser.Math.Between(1, 100);
                    let tipeDipilih = 'kroco'; 
                    if (angkaAcak <= 70) {
                        tipeDipilih = 'kroco';
                    } else if (angkaAcak <= 90) {
                        tipeDipilih = 'elite';
                    } else {
                        tipeDipilih = 'big'; // 10% peluang spawn musuh Big
                    }
                    this.bikinMusuh(spawnX, spawnY, tipeDipilih);
                }
            }

            this.physics.add.collider(player, enemyGroup, this.hantamPlayer, null, this);

            // 3. --- PENGATURAN KOLISI AGAR TIDAK NUMPUK ---
            this.physics.add.collider(enemyGroup, enemyGroup);   // Musuh saling bertabrakan (TIDAK NUMPUK)
            this.physics.add.collider(enemyGroup, batuGroup);    // Musuh tidak bisa menembus batu rintangan

            // --- ATUR KEDEKATAN KAMERA DI SINI ---
            // Angka default standar adalah 1. 
            // Iseng ubah angkanya sesuai selera Anda:
            this.cameras.main.setZoom(2.5);

            if (player) {
                player.setDisplaySize(44, 64);
            }

            background.setTileScale(0.2, 0.2);

            // =================================================================
            // --- PERBAIKAN LAYER UI: TAMBAHKAN TEKS COOLDOWN SKILL ---
            // =================================================================
            hpText = this.add.text(20, 20, 'HP: ' + hp, {
                fontSize: '48px', fill: '#ffffff', fontStyle: 'bold', fontFamily: 'Arial'
            });

            skorText = this.add.text(20, 80, 'SKOR: ' + skor, {
                fontSize: '48px', fill: '#ffffff', fontStyle: 'bold', fontFamily: 'Arial'
            });

            // Teks indikator kesiapan skill dash baru
            this.cdText = this.add.text(20, 140, 'DASH: INACTIVE', {
                fontSize: '32px', fill: '#888888', fontStyle: 'bold', fontFamily: 'Arial'
            });

            // Masukkan cdText ke dalam urutan susunan container
            let uiContainer = this.add.container(0, 0, [hpText, skorText, this.cdText]);
            uiContainer.setScrollFactor(0);
            uiContainer.setDepth(999);

            let faktorZoom = 2.5;
            uiContainer.setScale(1 / faktorZoom);
            uiContainer.setPosition(
                (this.scale.width / 2) * (1 - 1 / faktorZoom),
                (this.scale.height / 2) * (1 - 1 / faktorZoom)
            );

            // Hapus registrasi spaceKey lama, ganti dengan listen klik mouse:
            this.input.on('pointerdown', (pointer) => {
                // Angka 0 menandakan klik kiri mouse
                if (pointer.button === 0) {
                    this.eksekusiSerangan();
                }
            });

            // 2. Buat objek sensor serangan (hitbox) tak terlihat
            // Ukuran 80x80 piksel (sesuai jangkauan senjata)
            attackZone = this.physics.add.image(0, 0, null);
            attackZone.setOrigin(0.5, 0.5);
            attackZone.body.setAllowGravity(false);
            attackZone.setVisible(false); // Sembunyikan karena ini cuma sensor gaib
            attackZone.body.enable = false; // Matikan dulu di awal game

            // 3. Buat objek khusus untuk menggambar efek visual ayunan senjata
            attackVisual = this.add.graphics();
            attackVisual.setDepth(998); // Taruh di atas lantai dan di bawah teks HP

            // Deteksi jika sensor tebasan (attackZone) menyentuh musuh di dalam enemyGroup
            this.physics.add.overlap(attackZone, enemyGroup, this.tebasMusuh, null, this);

            this.input.gamepad.once('down', (pad, button) => {
                console.log('Gamepad terdeteksi dan aktif!');
            });

            // --- TAMBAHKAN INI DI DALAM CREATE() SCENEGAME ---
            this.tombolEsc = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.ESC);

            // Dengarkan jika tombol Menu (Start / Indeks 9) di gamepad ditekan saat sedang bermain
            this.input.gamepad.on('down', (pad, button) => {
                if (button.index === 9 && hp > 0) { // Indeks 9 adalah tombol Start / Options / Menu
                    this.pemicuPause();
                }
            });

            // --- PERBAIKI PENGATURAN EVENT PAUSE & RESUME PADA SCENEGAME ---
            this.events.on('pause', () => { 
                // Matikan input saat game dijeda agar tidak bocor ke lapisan pause
                this.input.gamepad.removeAllListeners(); 
            });

            this.events.on('resume', () => {
                // Pastikan mesin fisika langsung bangun seketika
                if (this.physics && this.physics.world) {
                    this.physics.resume(); 
                }
                
                // Bersihkan listener hantu dari ScenePause
                this.input.gamepad.removeAllListeners(); 
                
                // Beri jeda 300ms agar jari sempat diangkat dari tombol sebelum bisa pause lagi
                this.time.delayedCall(300, () => {
                    this.input.gamepad.on('down', (pad, button) => {
                        if (button.index === 9 && hp > 0) {
                            this.pemicuPause();
                        }
                    });
                });
            });
        }

        update(time) {
            // --- LOGIKA CEK TOMBOL PAUSE (Paling Atas) ---
            if (Phaser.Input.Keyboard.JustDown(this.tombolEsc) && hp > 0) {
                this.pemicuPause();
                return; // Hentikan kalkulasi frame gerakan saat pause dipicu
            }
            
            // 1. DAFTARKAN PAD PERTAMA JIKA TERHUBUNG
            let pad = this.input.gamepad.total ? this.input.gamepad.getPad(0) : null;

            // =================================================================
            // --- PERBAIKAN LOGIKA: LOCK ORIENTATION (MURNI MEMORI ANALOG KANAN) ---
            // =================================================================
            let pointer = this.input.activePointer;
            const DEADZONE_ANALOG = 0.25; // Naikkan sedikit deadzone agar lebih stabil
            
            let analogKananX = pad ? pad.axes[2].value : 0;
            let analogKananY = pad ? pad.axes[3].value : 0;
            
            // Cek apakah ada input aktif pada analog kanan
            let analogKananAktif = pad && (Math.abs(analogKananX) > DEADZONE_ANALOG || Math.abs(analogKananY) > DEADZONE_ANALOG);

            if (analogKananAktif) {
                // 1. Simpan sudut radian aktual saat analog didorong
                this.sudutBidikanTerakhir = Math.atan2(analogKananY, analogKananX);
                
                // 2. Tentukan visual flip karakter dari stik kanan saja
                if (analogKananX < -DEADZONE_ANALOG) {
                    player.setFlipX(true);
                    arahTerakhir = 'kiri';
                } else if (analogKananX > DEADZONE_ANALOG) {
                    player.setFlipX(false);
                    arahTerakhir = 'kanan';
                }
            } else if (pad) {
                // JIKA MENGGUNAKAN GAMEPAD & ANALOG KANAN DILEPAS: 
                // Kunci total arah visual! Abaikan arah jalan analog kiri (axes[0] dan axes[1]).
                // Karakter akan tetap menghadap ke posisi flipX terakhirnya secara permanen.
            } else {
                // JIKA MURNI MOUSE & KEYBOARD (Gamepad tidak aktif)
                if (pointer.worldX < player.x) {
                    player.setFlipX(true);
                    arahTerakhir = 'kiri';
                } else {
                    player.setFlipX(false);
                    arahTerakhir = 'kanan';
                }
            }

            // 3. LOGIKA GERAKAN GABUNGAN (WASD/PANAH ATAU ANALOG KIRI)
            if (!isKnockback) {
                player.setVelocity(0);

                let stikKiriX = pad ? pad.axes[0].value : 0;
                let stikKiriY = pad ? pad.axes[1].value : 0;
                const AMBANG_BATAS = 0.2; 

                // Tambahkan "this." di depan variabel wasd agar tombol W, A, S, D terbaca
                // Cek Gerakan Horizontal (Kiri / Kanan)
                if (cursors.left.isDown || this.wasd.left.isDown || stikKiriX < -AMBANG_BATAS) {
                    player.setVelocityX(-120); 
                } else if (cursors.right.isDown || this.wasd.right.isDown || stikKiriX > AMBANG_BATAS) {
                    player.setVelocityX(120);  
                }

                // Cek Gerakan Vertikal (Atas / Bawah)
                if (cursors.up.isDown || this.wasd.up.isDown || stikKiriY < -AMBANG_BATAS) {
                    player.setVelocityY(-120); 
                } else if (cursors.down.isDown || this.wasd.down.isDown || stikKiriY > AMBANG_BATAS) {
                    player.setVelocityY(120);  
                }
            } else {
                player.setVelocityX(player.body.velocity.x * 0.9);
                player.setVelocityY(player.body.velocity.y * 0.9);
            }

            // 4. DETEKSI TOMBOL RT (RIGHT TRIGGER / R2) UNTUK SERANGAN
            // Di Phaser, RT biasanya dikenali sebagai tombol indeks ke-7 (buttons[7]) atau axes[5]
            if (pad && pad.buttons[1] && pad.buttons[1].pressed) {
                this.eksekusiSerangan();
            }

            // =================================================================
            // --- LOGIKA PEMICU SKILL DASH (HOLD & RELEASE / TAP) ---
            // =================================================================
            if (!this.isDashing && hp > 0 && this.skillBisaDigunakan) {
                let rtDitekan = pad && pad.buttons[7] && pad.buttons[7].pressed;
                let eDitekan = this.tombolSkill.isDown;
                
                // Tombol Batal: C (Keyboard) atau A (Gamepad Index 0)
                let batalDitekan = this.tombolBatalC.isDown || (pad && pad.buttons[0] && pad.buttons[0].pressed);

                // 1. Cek Pembatalan
                if (this.isAimingSkill && batalDitekan) {
                    this.indikatorSkill.clear();
                    this.isAimingSkill = false;
                    this.isSkillCancelled = true; // Kunci supaya tidak dash saat tombol E/RT dilepas
                }

                // 2. Jika tombol dash (E/RT) dilepas, reset status cancel
                if (!(eDitekan || rtDitekan)) {
                    this.isSkillCancelled = false;
                }

                // Tentukan sudut bidikan
                let sudutDash = this.sudutBidikanTerakhir;
                if (!pad) {
                    sudutDash = Phaser.Math.Angle.Between(player.x, player.y, pointer.worldX, pointer.worldY);
                }

                // 3. Logika Membidik (Hanya jalan jika TIDAK sedang di-cancel)
                if ((eDitekan || rtDitekan) && !this.isSkillCancelled) {
                    if (!this.isAimingSkill) {
                        this.isAimingSkill = true;
                        this.waktuMulaiTekanSkill = time;
                    }

                    this.indikatorSkill.clear();

                    if (time - this.waktuMulaiTekanSkill > 150) {
                        const JARAK_DASH = 150; // Jarak jangkauan dash
                        let targetX = player.x + Math.cos(sudutDash) * JARAK_DASH;
                        let targetY = player.y + Math.sin(sudutDash) * JARAK_DASH;

                        // Menggambar garis indikator (Warna Putih Transparan)
                        this.indikatorSkill.lineStyle(4, 0xffffff, 0.5);
                        this.indikatorSkill.beginPath();
                        this.indikatorSkill.moveTo(player.x, player.y);
                        this.indikatorSkill.lineTo(targetX, targetY);
                        this.indikatorSkill.strokePath();

                        // Menggambar lingkaran kecil di ujung tujuan dash
                        this.indikatorSkill.fillStyle(0xffffff, 0.8);
                        this.indikatorSkill.fillCircle(targetX, targetY, 6);
                    }
                } 
                // 4. Eksekusi Dash (Hanya jika sedang membidik dan tombol dilepas)
                else if (!eDitekan && !rtDitekan && this.isAimingSkill) {
                    this.indikatorSkill.clear();
                    this.isAimingSkill = false;
                    this.eksekusiSkillDash(sudutDash);
                }
            }

            // =================================================================
            // --- LOGIKA PEMICU SKILL ULTIMATE (Q / LT) ---
            // =================================================================
            if (!this.isUltimating && hp > 0 && this.ultReady) {
                let ltDitekan = pad && pad.buttons[6] && pad.buttons[6].pressed; 
                let qDitekan = this.tombolUlti.isDown;
                let batalDitekan = this.tombolBatalC.isDown || (pad && pad.buttons[0] && pad.buttons[0].pressed);

                if (this.isAimingUlt && batalDitekan) {
                    this.indikatorUlt.clear();
                    this.isAimingUlt = false;
                    this.isUltCancelled = true;
                }
                if (!(qDitekan || ltDitekan)) this.isUltCancelled = false;

                let sudutUlt = this.sudutBidikanTerakhir;
                if (!pad) sudutUlt = Phaser.Math.Angle.Between(player.x, player.y, pointer.worldX, pointer.worldY);

                if ((qDitekan || ltDitekan) && !this.isUltCancelled) {
                    if (!this.isAimingUlt) {
                        this.isAimingUlt = true;
                        this.waktuMulaiTekanUlt = time;
                    }
                    this.indikatorUlt.clear();
                    if (time - this.waktuMulaiTekanUlt > 150) {
                        if (this.tipeUltTerakhir === 'dash') {
                            // Indikator garis untuk Ulti Dash (arah & jarak tujuan)
                            const JARAK_ULT = 220; 
                            let targetX = player.x + Math.cos(sudutUlt) * JARAK_ULT;
                            let targetY = player.y + Math.sin(sudutUlt) * JARAK_ULT;
                            this.indikatorUlt.lineStyle(12, 0xffffff, 0.5); 
                            this.indikatorUlt.beginPath();
                            this.indikatorUlt.moveTo(player.x, player.y);
                            this.indikatorUlt.lineTo(targetX, targetY);
                            this.indikatorUlt.strokePath();
                            this.indikatorUlt.fillStyle(0xffffff, 0.8);
                            this.indikatorUlt.fillCircle(targetX, targetY, 12);
                        } else {
                            // Indikator donat untuk Ulti Lingkaran (radius area serangan)
                            const RADIUS_LINGKARAN = 100; // Samakan dengan radius damage di eksekusiSkillUltimateLingkaran
                            const TEBAL_DONAT = 40;
                            this.indikatorUlt.lineStyle(TEBAL_DONAT, 0xffffff, 0.6);
                            this.indikatorUlt.strokeCircle(player.x, player.y, RADIUS_LINGKARAN);
                        }
                    }
                } else if (!qDitekan && !ltDitekan && this.isAimingUlt) {
                    this.indikatorUlt.clear();
                    this.isAimingUlt = false;
                    
                    if (this.tipeUltTerakhir === 'dash') {
                        if (this.ultReady) {
                            this.eksekusiSkillUltimate(sudutUlt);
                        }
                    } else {
                        if (this.ultReady) {
                            this.eksekusiSkillUltimateLingkaran(sudutUlt);
                        }
                    }
                }
            }
        
            // =================================================================
            // --- LOGIKA RENDER UI TEKS STATUS ---
            // =================================================================
            if (this.cdText) {
                // 1. Cek apakah ada musuh yang BENAR-BENAR masih bertanda biru
                let adaDarahBiruAktif = enemyGroup.getChildren().some(e => e.getData('statusTandaBiru') === true);

                // 2. Gunakan status musuh sebagai acuan utama, bukan hanya variabel waktu
                if (adaDarahBiruAktif) {
                    let sisaWaktu = (this.waktuSelesaiDarahBiru - time) / 1000;
                    
                    if (sisaWaktu > 0) {
                        this.cdText.setText('DASH: ' + sisaWaktu.toFixed(1) + 's');
                        this.cdText.setStyle({ fill: '#888888' }); // Warna biru saat aktif
                    } else {
                        // Jika waktu habis tapi musuh belum reset, paksa reset ke GA AKTIF
                        this.cdText.setText('DASH: GA AKTIF');
                        this.cdText.setStyle({ fill: '#888888' });
                    }
                } else {
                    // Jika tidak ada musuh yang aktif, pastikan teks selalu GA AKTIF
                    this.cdText.setText('DASH: GA AKTIF');
                    this.cdText.setStyle({ fill: '#888888' });
                }
            }
        }

        // --- TARUH METHOD PAUSE MANDIRI ANDA DI SINI (DI LUAR UPDATE) ---
        pemicuPause() {
            if (player && player.body) {
                player.setVelocity(0); // Menggunakan variabel global 'player'
            }
            this.physics.pause();       
            this.scene.pause();         
            this.scene.launch('ScenePause'); 
        }

        hantamPlayer(player, enemy) {
            if (hp <= 0) return;

            let tipeMusuh = enemy.getData('tipe');

            if (tipeMusuh === 'kroco' || tipeMusuh === 'elite') {
                this.prosesSeranganKroco(player, enemy);
            }
            // Blok Game Over lama di bawah sini sudah dihapus total karena sudah dipindah ke atas
        }

        eksekusiSerangan() {
            if (isAttacking || hp <= 0 || !attackVisual) return;
            this.tipeUltTerakhir = 'serangan';

            const JANGKAUAN = JANGKAUAN_SERANGAN;
            let pointer = this.input.activePointer;
            let pad = this.input.gamepad.total ? this.input.gamepad.getPad(0) : null;
            
            let sudutRadian;
            const DEADZONE_ANALOG = 0.25;

            if (pad) {
                let analogKananX = pad.axes[2].value;
                let analogKananY = pad.axes[3].value;
                let analogKananAktif = (Math.abs(analogKananX) > DEADZONE_ANALOG || Math.abs(analogKananY) > DEADZONE_ANALOG);

                if (analogKananAktif) {
                    // Jika stik kanan sedang didorong, tebas ke arah dorongan aktif
                    sudutRadian = Math.atan2(analogKananY, analogKananX);
                    this.sudutBidikanTerakhir = sudutRadian; // Perbarui memori
                } else {
                    // --- KODE KUNCI: Jika stik kanan dilepas, gunakan sudut memori terakhir ---
                    sudutRadian = this.sudutBidikanTerakhir;
                }
            } else {
                // Jika menggunakan mouse & keyboard
                sudutRadian = Phaser.Math.Angle.Between(player.x, player.y, pointer.worldX, pointer.worldY);
            }

            let sudutDerajat = Phaser.Math.RadToDeg(sudutRadian);
            isAttacking = true;

            // Menggeser letak sensor tabrakan fisik searah garis lurus kursor mouse
            attackZone.body.setSize(JANGKAUAN * 1.2, JANGKAUAN * 1.2); 
            attackZone.setPosition(
                player.x + Math.cos(sudutRadian) * (JANGKAUAN / 1.5),
                player.y + Math.sin(sudutRadian) * (JANGKAUAN / 1.5)
            );

            // =================================================================
            // --- IMPLEMENTASI ANIMASI SWIPE/SLIDE SABIT PUTIH ---
            // =================================================================
            
            // Definisikan batas busur serangan (70 derajat ke kanan dan 70 derajat ke kiri)
            // Karena ayunan dimulai dari KANAN ke KIRI sudut pandang karakter, 
            // maka sudut awal dimulai dari (+70) menuju (-70)
            let sudutMulaiAsal = sudutDerajat + 70;
            let TOTAL_AYUNAN = 140; 

            // Buat objek penampung data tween untuk animasi
            let efekSlash = {
                progress: 0, // 0 artinya baru mulai di ujung kanan, 1 artinya penuh sampai ujung kiri
                alpha: 1     // Nilai transparansi untuk efek fade out
            };

            attackZone.body.enable = true;

            // Jalankan Tween untuk memanipulasi progress gambar sabitan secara realtime
            this.tweens.add({
                targets: efekSlash,
                progress: 1,           // Selama 120ms, kembangkan busur sabit hingga penuh
                duration: 120,
                ease: 'Quad.easeOut',
                onUpdate: () => {
                    attackVisual.clear();
                    
                    // Sesuai permintaan: Ubah warna menjadi murni PUTIH (0xffffff)
                    attackVisual.fillStyle(0xffffff, efekSlash.alpha * 0.7);
                    attackVisual.lineStyle(1, 0xffffff, efekSlash.alpha);

                    let kumpulanTitik = [];
                    
                    // Hitung seberapa jauh sudut yang sudah ditempuh saat ini
                    let cakupanSudutAktif = TOTAL_AYUNAN * efekSlash.progress;
                    let sudutSelesaiSeketika = sudutMulaiAsal - cakupanSudutAktif;

                    // 1. Gambar busur luar yang bergerak memanjang ke kiri
                    for (let a = sudutMulaiAsal; a >= sudutSelesaiSeketika; a -= 5) {
                        let rad = Phaser.Math.DegToRad(a);
                        let x = player.x + Math.cos(rad) * JANGKAUAN;
                        let y = player.y + Math.sin(rad) * JANGKAUAN;
                        kumpulanTitik.push(new Phaser.Geom.Point(x, y));
                    }

                    // 2. Gambar busur dalam (pembentuk efek sabit tebal di tengah)
                    for (let a = sudutSelesaiSeketika; a <= sudutMulaiAsal; a += 5) {
                        let rad = Phaser.Math.DegToRad(a);
                        
                        // Ketebalan dinamis mengikuti kurva sinus terhadap porsi sudut yang aktif berjalan
                        let faktorKetebalan = Math.sin(Phaser.Math.DegToRad(a - sudutSelesaiSeketika) * (180 / Math.max(cakupanSudutAktif, 1))) * 0.35;
                        let jarakDalam = JANGKAUAN * (1 - faktorKetebalan);

                        let x = player.x + Math.cos(rad) * jarakDalam;
                        let y = player.y + Math.sin(rad) * jarakDalam;
                        kumpulanTitik.push(new Phaser.Geom.Point(x, y));
                    }

                    // Render poligon sabit ke canvas game jika sudah ada titik koordinatnya
                    if (kumpulanTitik.length > 0) {
                        attackVisual.fillPoints(kumpulanTitik, true, true);
                        
                        // Gambar garis tajam luar
                        attackVisual.beginPath();
                        let radMulai = Phaser.Math.DegToRad(sudutMulaiAsal);
                        let radSelesai = Phaser.Math.DegToRad(sudutSelesaiSeketika);
                        attackVisual.arc(player.x, player.y, JANGKAUAN, radMulai, radSelesai, true);
                        attackVisual.strokePath();
                    }
                },
                onComplete: () => {
                    // --- TWEEN KEDUA: EFEK FADE OUT (MENGHILANG PERLAHAN) ---
                    // Setelah sabit terbentuk sempurna (full), pudarkan alpha-nya ke 0 dalam 80ms
                    this.tweens.add({
                        targets: efekSlash,
                        alpha: 0,
                        duration: 200,
                        onUpdate: () => {
                            // Terapkan sisa render visual terakhir dengan opasitas alpha yang menurun
                            attackVisual.setAlpha(efekSlash.alpha);
                        },
                        onComplete: () => {
                            attackVisual.clear();
                            attackVisual.setAlpha(1); // Reset alpha default komponen grafis
                            attackZone.body.enable = false;
                        }
                    });
                }
            });

            // TIMER COOLDOWN SERANGAN (Tetap setengah detik sebelum bisa input tebas lagi)
            this.time.delayedCall(500, () => {
                isAttacking = false;
            }, [], this);
        }

        tebasMusuh(zone, enemy) {
            if (!enemy || !enemy.active) return;
            if (zone.body.embedded || enemy.getData('baruKenaTebas')) return;
            
            enemy.setData('baruKenaTebas', true);
            enemy.scene.time.delayedCall(150, () => { if(enemy.active) enemy.setData('baruKenaTebas', false); });

            // =================================================================
            // --- PERBAIKAN 4: BONUS DAMAGE SEPEREMPAT PERSEN (25%) SAAT COOLDOWN DARAH BIRU AKTIF ---
            // =================================================================
            let baseDamage = 8;
            let adaDarahBiruAktif = enemyGroup.getChildren().some(e => e.getData('statusTandaBiru') === true);
            let damageAkhir = adaDarahBiruAktif ? (baseDamage * 1.25) : baseDamage;

            let darahMusuh = enemy.getData('enemyHp') - damageAkhir;   // <- pakai damageAkhir
            enemy.setData('enemyHp', darahMusuh);

            // =================================================================
            // --- TAMBAHKAN LINE INI DI DALAM FUNGSI TEBASMUSUH ---
            // =================================================================
            this.munculkanTeksDamage(enemy.x, enemy.y, damageAkhir);

            let tks = enemy.getData('hpTextObject');
            if (tks) tks.setText(darahMusuh);

            // --- AKTIFKAN STATUS KNOCKBACK PADA MUSUH ---
            enemy.setData('sedangKnockback', true);

            let sudut = Phaser.Math.Angle.Between(player.x, player.y, enemy.x, enemy.y);
            enemy.setVelocityX(Math.cos(sudut) * 150); // Naikkan sedikit kekuatannya agar terasa mantap (300)
            enemy.setVelocityY(Math.sin(sudut) * 150);

            // TIMER: Setelah 200 milidetik, hentikan dorongan dan izinkan AI musuh mengejar player kembali
            enemy.scene.time.delayedCall(200, () => {
                if (enemy && enemy.active) {
                    enemy.setData('sedangKnockback', false);
                }
            });

            enemy.setTint(0xff0000);
            enemy.scene.time.delayedCall(100, () => {
                if (enemy && enemy.active) enemy.clearTint();
            });

            // --- LOGIKA KETIKA MUSUH MATI (SPAWN 2 MUSUH DI LUAR LAYAR) ---
            if (darahMusuh <= 0) {
                if (tks) tks.destroy();

                skor += 10;
                skorText.setText('SKOR: ' + skor);

                let scene = enemy.scene;
                let kamera = scene.cameras.main;
                
                // =============================================================
                // --- REVISI: BLOK RESPAWN BERSIH PADA TEBASMUSUH ---
                // =============================================================
                for (let k = 0; k < 2; k++) {
                    let spawnX, spawnY;
                    let beradaDiDalamLayar = true;

                    while (beradaDiDalamLayar) {
                        spawnX = Phaser.Math.Between(200, MAP_WIDTH - 200);
                        spawnY = Phaser.Math.Between(200, MAP_HEIGHT - 200);

                        let diDalamX = (spawnX >= kamera.worldView.x && spawnX <= kamera.worldView.x + kamera.worldView.width);
                        let diDalamY = (spawnY >= kamera.worldView.y && spawnY <= kamera.worldView.y + kamera.worldView.height);

                        if (!diDalamX || !diDalamY) {
                            beradaDiDalamLayar = false; 
                        }
                    }

                    let tipeRespawn = (Phaser.Math.Between(1, 100) <= 85) ? 'kroco' : 'elite';
                    scene.bikinMusuh(spawnX, spawnY, tipeRespawn);
                }
                
                enemyGroup.remove(enemy, true, true);
            }
        }
    
        eksekusiSkillDash(sudutRadian) {
            if (this.isDashing || !this.skillBisaDigunakan) return;
            this.tipeUltTerakhir = 'dash';

            this.isDashing = true;
            this.skillBisaDigunakan = false; 
            isKnockback = true; 

            const KECEPATAN_DASH = 2000; 
            const DURASI_DASH = 100;    
            const DAMAGE_DASH = 16;     
            const COOLDOWN_CEPAT = 120;   
            const COOLDOWN_ASLI = 2000;   
            const DURASI_DARAH_BIRU = 3000; 

            // =================================================================
            // --- FIX MECHANIC: LAYANGAN STRETCH DINAMIS (EKOR DIKUNCI DI START) ---
            // =================================================================
            const titikAwalX = player.x;
            const titikAwalY = player.y;

            let efekPoligonDash = this.add.graphics();
            efekPoligonDash.setDepth(995); 

            let dataEfekPoligon = { alpha: 0.4 }; 

            let penggambarPoligonRealtime = this.time.addEvent({
                delay: 16, 
                loop: true,
                callback: () => {
                    if (efekPoligonDash) {
                        efekPoligonDash.clear();
                        efekPoligonDash.fillStyle(0xffffff, dataEfekPoligon.alpha);

                        let sudutTegakLurus = sudutRadian + Math.PI / 2;
                        
                        // --- KONFIGURASI UKURAN LAYANGAN STRETCH ---
                        const LEBAR_SAYAP = 20;         // Lebar bentangan sayap kiri-kanan
                        const JARAK_LANCIP_DEPAN = 15;   // Kepala lancip PENDEK BANGET menempel di posisi player (bisa diatur)
                        const JARAK_SAYAP_DARI_DEPAN = 25; // Jarak sayap dihitung mundur dari posisi player saat ini

                        // Titik 1: Ekor Paling Belakang (DIKUNCI MATI di titik awal game saat start dash)
                        let ekorX = titikAwalX;
                        let ekorY = titikAwalY;

                        // Titik 4: Kepala Lancip Pendek (Mengikuti persis di titik depan player)
                        let kepalaX = player.x + Math.cos(sudutRadian) * JARAK_LANCIP_DEPAN;
                        let kepalaY = player.y + Math.sin(sudutRadian) * JARAK_LANCIP_DEPAN;

                        // Titik 2 & 3: Sayap Kiri & Kanan (Posisinya dinamis, ikut maju mengikuti player)
                        let titikPusatSayapX = player.x - Math.cos(sudutRadian) * JARAK_SAYAP_DARI_DEPAN;
                        let titikPusatSayapY = player.y - Math.sin(sudutRadian) * JARAK_SAYAP_DARI_DEPAN;
                        
                        let sayapKiriX = titikPusatSayapX + Math.cos(sudutTegakLurus) * LEBAR_SAYAP;
                        let sayapKiriY = titikPusatSayapY + Math.sin(sudutTegakLurus) * LEBAR_SAYAP;
                        let sayapKananX = titikPusatSayapX - Math.cos(sudutTegakLurus) * LEBAR_SAYAP;
                        let sayapKananY = titikPusatSayapY - Math.sin(sudutTegakLurus) * LEBAR_SAYAP;

                        // Susun formasi layangan melar
                        let kumpulanTitikLayangan = [
                            new Phaser.Geom.Point(ekorX, ekorY),
                            new Phaser.Geom.Point(sayapKiriX, sayapKiriY),
                            new Phaser.Geom.Point(kepalaX, kepalaY), 
                            new Phaser.Geom.Point(sayapKananX, sayapKananY)
                        ];

                        efekPoligonDash.fillPoints(kumpulanTitikLayangan, true);
                    }
                }
            });

            let mumpuniMemicuCooldownLama = false;
            let jumlahMusuhTertabrak = 0; 
            
            // --- VARIABEL KUNCI BARU: Melacak apakah ada musuh merah (baru) yang kena ---
            let kenaMusuhBaru = false; 

            player.body.checkCollision.none = true;
            let hpSaatMulaiDash = hp;

            player.setVelocityX(Math.cos(sudutRadian) * KECEPATAN_DASH);
            player.setVelocityY(Math.sin(sudutRadian) * KECEPATAN_DASH);
            player.setTint(0xffffff); 

            let dashHitbox = this.physics.add.image(player.x, player.y, null);
            dashHitbox.setDisplaySize(player.displayWidth * 1.5, player.displayHeight * 1.5);
            dashHitbox.body.setAllowGravity(false);
            dashHitbox.setVisible(false);

            let overlapDash = this.physics.add.overlap(dashHitbox, enemyGroup, (hitbox, enemy) => {
                if (enemy.getData('terkenaDamageDash')) return;
                enemy.setData('terkenaDamageDash', true);

                jumlahMusuhTertabrak++; 

                let darahMusuh = enemy.getData('enemyHp') - DAMAGE_DASH;
                enemy.setData('enemyHp', darahMusuh);

                // =============================================================
                // --- TAMBAHKAN LINE INI DI DALAM CALLBACK OVERLAP DASH ---
                // =============================================================
                this.munculkanTeksDamage(enemy.x, enemy.y, DAMAGE_DASH);

                let tks = enemy.getData('hpTextObject');
                if (tks) tks.setText(darahMusuh);

                let sudahAdaTandaBiru = enemy.getData('statusTandaBiru');

                if (sudahAdaTandaBiru) {
                    mumpuniMemicuCooldownLama = true;
                } else {
                    // --- RE-START UTAMA JIKA MENGENAI MUSUH DARAH MERAH BIASA ---
                    kenaMusuhBaru = true; // Tandai ada target baru yang sukses terkena dash
                    
                    enemy.setData('statusTandaBiru', true);
                    if (tks) tks.setStyle({ fill: '#0000ff' });

                    this.waktuSelesaiDarahBiru = this.time.now + DURASI_DARAH_BIRU;

                    this.time.delayedCall(DURASI_DARAH_BIRU, () => {
                        if (enemy && enemy.active) {
                            enemy.setData('statusTandaBiru', false);
                            let currentTks = enemy.getData('hpTextObject');
                            if (currentTks) currentTks.setStyle({ fill: '#ff0000' }); 
                        }
                    }, [], this);
                }

                enemy.setData('sedangKnockback', true);
                enemy.setVelocityX(Math.cos(sudutRadian) * 200);
                enemy.setVelocityY(Math.sin(sudutRadian) * 200);
                enemy.setTint(sudahAdaTandaBiru ? 0x00ffff : 0xff0000);

                this.time.delayedCall(150, () => {
                    if (enemy && enemy.active) {
                        enemy.clearTint();
                        enemy.setData('sedangKnockback', false);
                        enemy.setData('terkenaDamageDash', false);
                    }
                });

                if (darahMusuh <= 0) {
                    this.tebasMusuh({body: {embedded: false}}, enemy);
                }
            }, null, this);

            let pengikutPosisi = this.time.addEvent({
                delay: 16, loop: true,
                callback: () => {
                    if (dashHitbox && dashHitbox.body) dashHitbox.setPosition(player.x, player.y);
                    if (this.isDashing) {
                        hp = hpSaatMulaiDash;
                        hpText.setText('HP: ' + hp);
                    }
                }
            });

            this.time.delayedCall(DURASI_DASH, () => {
                player.clearTint();
                player.setVelocity(0);
                isKnockback = false;   
                this.isDashing = false;
                player.body.checkCollision.none = false; 

                pengikutPosisi.destroy();
                overlapDash.destroy();
                dashHitbox.destroy();

                // =============================================================
                // --- PROSES MEMUDARKAN (FADE OUT) GEOMETRI LAYANGAN STRETCH ---
                // =============================================================
                penggambarPoligonRealtime.destroy(); 

                this.tweens.add({
                    targets: dataEfekPoligon,
                    alpha: 0, 
                    duration: 200,
                    ease: 'Cubic.easeOut',
                    onUpdate: () => {
                        if (efekPoligonDash) {
                            efekPoligonDash.clear();
                            efekPoligonDash.fillStyle(0xffffff, dataEfekPoligon.alpha);

                            let sudutTegakLurus = sudutRadian + Math.PI / 2;
                            const LEBAR_SAYAP = 20;       
                            const JARAK_LANCIP_DEPAN = 15; 
                            const JARAK_SAYAP_DARI_DEPAN = 25;

                            let ekorX = titikAwalX;
                            let ekorY = titikAwalY;
                            
                            let kepalaX = player.x + Math.cos(sudutRadian) * JARAK_LANCIP_DEPAN;
                            let kepalaY = player.y + Math.sin(sudutRadian) * JARAK_LANCIP_DEPAN;

                            let titikPusatSayapX = player.x - Math.cos(sudutRadian) * JARAK_SAYAP_DARI_DEPAN;
                            let titikPusatSayapY = player.y - Math.sin(sudutRadian) * JARAK_SAYAP_DARI_DEPAN;
                            let sayapKiriX = titikPusatSayapX + Math.cos(sudutTegakLurus) * LEBAR_SAYAP;
                            let sayapKiriY = titikPusatSayapY + Math.sin(sudutTegakLurus) * LEBAR_SAYAP;
                            let sayapKananX = titikPusatSayapX - Math.cos(sudutTegakLurus) * LEBAR_SAYAP;
                            let sayapKananY = titikPusatSayapY - Math.sin(sudutTegakLurus) * LEBAR_SAYAP;

                            let kumpulanTitikFinal = [
                                new Phaser.Geom.Point(ekorX, ekorY),
                                new Phaser.Geom.Point(sayapKiriX, sayapKiriY),
                                new Phaser.Geom.Point(kepalaX, kepalaY),
                                new Phaser.Geom.Point(sayapKananX, sayapKananY)
                            ];
                            efekPoligonDash.fillPoints(kumpulanTitikFinal, true);
                        }
                    },
                    onComplete: () => {
                        if (efekPoligonDash) efekPoligonDash.destroy(); 
                    }
                });

                // Ganti bagian penentuan durasiPilihanCD dengan ini:
                let durasiPilihanCD;
                let sisaWaktuBiru = this.waktuSelesaiDarahBiru - this.time.now;
                
                // PRIORITAS 1: Jika kena musuh baru (merah), selalu cooldown cepat
                if (kenaMusuhBaru) {
                    durasiPilihanCD = COOLDOWN_CEPAT;
                } 
                // PRIORITAS 2: Jika meleset total (tidak kena musuh sama sekali)
                else if (jumlahMusuhTertabrak === 0) {
                    durasiPilihanCD = COOLDOWN_ASLI;
                } 
                // PRIORITAS 3: Jika hanya kena musuh bertanda biru
                else if (mumpuniMemicuCooldownLama) {
                    // Hanya cooldown lama jika durasi tanda biru masih di atas 1 detik
                    if (sisaWaktuBiru > 1000) {
                        durasiPilihanCD = COOLDOWN_ASLI;
                    } else {
                        durasiPilihanCD = COOLDOWN_CEPAT;
                    }
                } 
                else {
                    durasiPilihanCD = COOLDOWN_CEPAT;
                }

                this.waktuSelesaiCooldown = this.time.now + durasiPilihanCD;

                this.time.delayedCall(durasiPilihanCD, () => {
                    if (hp > 0) {
                        this.skillBisaDigunakan = true;
                        
                        let adaDarahBiruAktif = enemyGroup.getChildren().some(enemy => enemy.getData('statusTandaBiru') === true);
                        if (!adaDarahBiruAktif && this.cdText) {
                            this.cdText.setText('DASH: GA AKTIF');
                            this.cdText.setStyle({ fill: '#888888' }); 
                        }

                        player.setTint(0x00ff00);
                        this.time.delayedCall(100, () => player.clearTint());
                    }
                }, [], this);

            }, [], this);
        }

        eksekusiSkillUltimate(sudutRadian) {
            if (this.isUltimating || !this.ultReady) return;
            this.isUltimating = true;
            this.ultReady = false;

            isKnockback = true; 

            const KECEPATAN_ULTI = 2500;    // Lebih cepat (Dash: 2000)
            const DURASI_ULTI = 300;        // Lebih lama (Dash: 100)
            const DAMAGE_ULTI = 24;         // Jauh lebih sakit (Dash: 16)

            // =================================================================
            // --- FIX MECHANIC: LAYANGAN STRETCH DINAMIS (EKOR DIKUNCI DI START) ---
            // =================================================================
            const titikAwalX = player.x;
            const titikAwalY = player.y;

            let efekPoligonDash = this.add.graphics();
            efekPoligonDash.setDepth(995); 

            let dataEfekPoligon = { alpha: 0.4 }; 

            let penggambarPoligonRealtime = this.time.addEvent({
                delay: 16, 
                loop: true,
                callback: () => {
                    if (efekPoligonDash?.active) {
                        efekPoligonDash.clear();
                        efekPoligonDash.fillStyle(0x00ffff, dataEfekPoligon.alpha);

                        let sudutTegakLurus = sudutRadian + Math.PI / 2;
                        
                        // --- KONFIGURASI UKURAN LAYANGAN STRETCH ---
                        const LEBAR_SAYAP = 20;         // Lebar bentangan sayap kiri-kanan
                        const JARAK_LANCIP_DEPAN = 15;   // Kepala lancip PENDEK BANGET menempel di posisi player (bisa diatur)
                        const JARAK_SAYAP_DARI_DEPAN = 25; // Jarak sayap dihitung mundur dari posisi player saat ini

                        // Titik 1: Ekor Paling Belakang (DIKUNCI MATI di titik awal game saat start dash)
                        let ekorX = titikAwalX;
                        let ekorY = titikAwalY;

                        // Titik 4: Kepala Lancip Pendek (Mengikuti persis di titik depan player)
                        let kepalaX = player.x + Math.cos(sudutRadian) * JARAK_LANCIP_DEPAN;
                        let kepalaY = player.y + Math.sin(sudutRadian) * JARAK_LANCIP_DEPAN;

                        // Titik 2 & 3: Sayap Kiri & Kanan (Posisinya dinamis, ikut maju mengikuti player)
                        let titikPusatSayapX = player.x - Math.cos(sudutRadian) * JARAK_SAYAP_DARI_DEPAN;
                        let titikPusatSayapY = player.y - Math.sin(sudutRadian) * JARAK_SAYAP_DARI_DEPAN;
                        
                        let sayapKiriX = titikPusatSayapX + Math.cos(sudutTegakLurus) * LEBAR_SAYAP;
                        let sayapKiriY = titikPusatSayapY + Math.sin(sudutTegakLurus) * LEBAR_SAYAP;
                        let sayapKananX = titikPusatSayapX - Math.cos(sudutTegakLurus) * LEBAR_SAYAP;
                        let sayapKananY = titikPusatSayapY - Math.sin(sudutTegakLurus) * LEBAR_SAYAP;

                        // Susun formasi layangan melar
                        let kumpulanTitikLayangan = [
                            new Phaser.Geom.Point(ekorX, ekorY),
                            new Phaser.Geom.Point(sayapKiriX, sayapKiriY),
                            new Phaser.Geom.Point(kepalaX, kepalaY), 
                            new Phaser.Geom.Point(sayapKananX, sayapKananY)
                        ];

                        efekPoligonDash.fillPoints(kumpulanTitikLayangan, true);
                    }
                }
            });

            player.body.checkCollision.none = true;

            this.time.delayedCall(10, () => {
                if(player && player.body) {
                    player.setVelocityX(Math.cos(sudutRadian) * KECEPATAN_ULTI);
                    player.setVelocityY(Math.sin(sudutRadian) * KECEPATAN_ULTI);
                }
            });
            player.setTint(0x00ffff); 

            let dashHitbox = this.physics.add.image(player.x, player.y, null);
            dashHitbox.setDisplaySize(player.displayWidth * 1.5, player.displayHeight * 1.5);
            dashHitbox.body.setAllowGravity(false);
            dashHitbox.setVisible(false);

            let overlapUlt = this.physics.add.overlap(dashHitbox, enemyGroup, (hitbox, enemy) => {
                if (enemy.getData('terkenaDamageUlti')) return; 
                enemy.setData('terkenaDamageUlti', true);
                
                let darahMusuh = enemy.getData('enemyHp') - DAMAGE_ULTI;
                enemy.setData('enemyHp', darahMusuh);
                this.munculkanTeksDamage(enemy.x, enemy.y, DAMAGE_ULTI);

                let tks = enemy.getData('hpTextObject');
                if (tks) tks.setText(darahMusuh);

                enemy.setData('sedangKnockback', true);
                enemy.setVelocityX(Math.cos(sudutRadian) * 300);
                enemy.setVelocityY(Math.sin(sudutRadian) * 300);
                enemy.setTint(0xff0000);

                this.time.delayedCall(200, () => {
                    if (enemy && enemy.active) {
                        enemy.clearTint();
                        enemy.setData('sedangKnockback', false);
                        enemy.setData('terkenaDamageUlti', false);
                    }
                });

                if (darahMusuh <= 0) this.tebasMusuh({ body: { embedded: false } }, enemy);
            }, null, this);

            let pengikutPosisi = this.time.addEvent({
                delay: 16, loop: true,
                callback: () => {
                    if (dashHitbox && dashHitbox.body) dashHitbox.setPosition(player.x, player.y);
                }
            });

            // =============================================================
            // LOGIKA SELESAI ULTIMATE DIUBAH
            // =============================================================
            this.time.delayedCall(DURASI_ULTI, () => { // Pakai DURASI_ULTI
                player.clearTint();
                player.setVelocity(0);
                isKnockback = false;
                this.isUltimating = false;    // Diubah
                player.body.checkCollision.none = false;

                if (penggambarPoligonRealtime) penggambarPoligonRealtime.destroy();
                if (pengikutPosisi) pengikutPosisi.destroy();
                if (overlapUlt) overlapUlt.destroy();
                if (dashHitbox) dashHitbox.destroy();

                this.tweens.add({
                    targets: dataEfekPoligon,
                    alpha: 0,
                    duration: 200,
                    ease: 'Cubic.easeOut',
                    onUpdate: () => {
                        if (efekPoligonDash) {
                            efekPoligonDash.clear();
                            // DIUBAH: Warna Sesuai tema (Biru Cyan)
                            efekPoligonDash.fillStyle(0x00ffff, dataEfekPoligon.alpha);

                            let sudutTegakLurus = sudutRadian + Math.PI / 2;
                            const LEBAR_SAYAP = 20;
                            const JARAK_LANCIP_DEPAN = 15;
                            const JARAK_SAYAP_DARI_DEPAN = 25;

                            let ekorX = titikAwalX;
                            let ekorY = titikAwalY;
                            let kepalaX = player.x + Math.cos(sudutRadian) * JARAK_LANCIP_DEPAN;
                            let kepalaY = player.y + Math.sin(sudutRadian) * JARAK_LANCIP_DEPAN;
                            let titikPusatSayapX = player.x - Math.cos(sudutRadian) * JARAK_SAYAP_DARI_DEPAN;
                            let titikPusatSayapY = player.y - Math.sin(sudutRadian) * JARAK_SAYAP_DARI_DEPAN;
                            let sayapKiriX = titikPusatSayapX + Math.cos(sudutTegakLurus) * LEBAR_SAYAP;
                            let sayapKiriY = titikPusatSayapY + Math.sin(sudutTegakLurus) * LEBAR_SAYAP;
                            let sayapKananX = titikPusatSayapX - Math.cos(sudutTegakLurus) * LEBAR_SAYAP;
                            let sayapKananY = titikPusatSayapY - Math.sin(sudutTegakLurus) * LEBAR_SAYAP;

                            let kumpulanTitikFinal = [
                                new Phaser.Geom.Point(ekorX, ekorY),
                                new Phaser.Geom.Point(sayapKiriX, sayapKiriY),
                                new Phaser.Geom.Point(kepalaX, kepalaY),
                                new Phaser.Geom.Point(sayapKananX, sayapKananY)
                            ];
                            efekPoligonDash.fillPoints(kumpulanTitikFinal, true);
                        }
                    },
                    onComplete: () => {
                        if (efekPoligonDash) efekPoligonDash.destroy();
                    }
                });
                // 3. Cooldown
                this.time.delayedCall(16000, () => {
                    this.ultReady = true;
                    // Hanya set tint jika player masih aktif
                    if (player && player.active) {
                        player.setTint(0x00ffff);
                        this.time.delayedCall(100, () => { if(player.active) player.clearTint(); });
                    }
                }, [], this);
            }, [], this);
        }

        eksekusiSkillUltimateLingkaran(sudutRadian) {
            if (this.isUltimating || !this.ultReady) return;
            this.isUltimating = true;
            this.ultReady = false;

            // Efek Visual Lingkaran
            let lingkaran = this.add.circle(player.x, player.y, 100, 0x00ffff, 0.3);
            this.tweens.add({
                targets: lingkaran,
                scale: 2,
                alpha: 0,
                duration: 300,
                onComplete: () => lingkaran.destroy()
            });

            // Deteksi Musuh di sekitar dalam radius 100
            enemyGroup.getChildren().forEach(enemy => {
                let jarak = Phaser.Math.Distance.Between(player.x, player.y, enemy.x, enemy.y);
                if (jarak < 100) {
                    // Berikan Damage (contoh 30)
                    let darahBaru = enemy.getData('enemyHp') - 16;
                    enemy.setData('enemyHp', darahBaru);
                    this.munculkanTeksDamage(enemy.x, enemy.y, 16);
                    if (enemy.getData('hpTextObject')) enemy.getData('hpTextObject').setText(darahBaru);

                    // Berikan Dorongan (Knockback) keluar dari player
                    let sudutDorong = Phaser.Math.Angle.Between(player.x, player.y, enemy.x, enemy.y);
                    enemy.setVelocity(Math.cos(sudutDorong) * 400, Math.sin(sudutDorong) * 400);

                    // --- FIX: kunci AI musuh sementara supaya velocity dorongan tidak langsung ditimpa ---
                    enemy.setData('sedangKnockback', true);
                    this.time.delayedCall(250, () => {
                        if (enemy && enemy.active) {
                            enemy.setData('sedangKnockback', false);
                        }
                    });

                    if (darahBaru <= 0) this.tebasMusuh({ body: { embedded: false } }, enemy);
                }
            });
            // --- INI FIX-NYA: lepas kunci isUltimating karena efek sudah selesai instan ---
            this.isUltimating = false;

            // Cooldown (2000ms = 2 detik; ganti ke 20000 kalau maksudnya 20 detik sesuai komentar asli)
            this.time.delayedCall(8000, () => {
                this.ultReady = true;
            }, [], this);
        }

        munculkanTeksDamage(x, y, jumlahDamage) {
            // Buat objek teks tepat di koordinat musuh saat terkena serangan
            let teksDamage = this.add.text(x + Phaser.Math.Between(-10, 10), y - 20, jumlahDamage, {
                fontSize: '12px',
                fill: '#ffffff', // Warna kuning jingga agar kontras dan tajam
                fontStyle: 'bold',
                fontFamily: 'Arial',
                stroke: '#000000', // Outlined hitam agar scannable di lantai gelap
                strokeThickness: 3
            });
            teksDamage.setOrigin(0.5);
            teksDamage.setDepth(996); // Di atas karakter, di bawah UI Layer

            // Jalankan animasi Tween selama 0.5 detik (500ms)
            this.tweens.add({
                targets: teksDamage,
                y: teksDamage.y - 30, // Bergerak naik ke atas secara elegan
                alpha: 0,             // Efek memudar (Fade Out) menjadi transparan
                duration: 500,        // Tepat 0.5 detik sesuai permintaan
                ease: 'Linear',
                onComplete: () => {
                    teksDamage.destroy(); // Hancurkan objek dari memori setelah selesai
                }
            });
        }
    
        bikinMusuh(x, y, tipe) {
            const spek = PROFIL_MUSUH[tipe] || PROFIL_MUSUH['kroco'];

            // Gunakan enemyGroup global yang sudah dibuat di create()
            let enemy = enemyGroup.create(x, y, spek.texture);
            
            // Berikan setting fisik
            enemy.setCollideWorldBounds(true);
            enemy.setDisplaySize(48, 64);
            enemy.body.setSize(24, 24);
            enemy.setBounce(0.2);

            enemy.setData({
                'tipe': tipe,
                'enemyHp': spek.hpMax,
                'kecepatanKustom': spek.kecepatan,
                'radiusDeteksi': spek.radiusDeteksi,
                'radiusSerang': spek.radiusSerang,
                'damageSerangan': spek.damage,
                'kekuatanDorong': spek.kekuatanDorong,
                'poinSkor': spek.skorPoin,
                'sedangCooldown': false,
                'sedangKnockback': false,
                'sedangEksekusiSerangan': false
            });

            // Teks HP
            let enemyHpText = this.add.text(enemy.x, enemy.y - 40, spek.hpMax.toString(), {
                fontSize: '12px',
                fill: spek.warnaTeks,
                fontStyle: 'bold'
            });
            enemyHpText.setOrigin(0.5, 0.5);
            enemy.setData('hpTextObject', enemyHpText);

            return enemy;
        }
    
        seranganTipeKroco(player, enemy) {
            // 1. Ambil spesifikasi variabel unik milik musuh ini dari memorinya
            let besarDamage = enemy.getData('damageSerangan');
            let dayaDorong = enemy.getData('kekuatanDorong');

            // 2. Kurangi HP Player
            hp -= besarDamage;
            hpText.setText('HP: ' + hp);
            
            // 3. Kunci pergerakan keyboard player seketika
            isKnockback = true; 
            
            // 4. Lemparkan player menggunakan variabel dayaDorong dinamis
            bikinKnockback(player, enemy, dayaDorong); 

            // Timer melepas kontrol keyboard player setelah 0.2 detik
            this.time.delayedCall(200, () => { 
                isKnockback = false; 
            }, [], this);

            // Efek kedip merah pada player saat menerima damage
            player.setTint(0xff0000); 
            this.time.delayedCall(150, () => {
                if (hp > 0) player.clearTint();
            }, [], this);
        }
    
        prosesSeranganKroco(player, enemy) {
            if (enemy.getData('sedangEksekusiSerangan')) return;
            enemy.setData('sedangEksekusiSerangan', true);
            enemy.setVelocity(0);

            // 1. Jeda sebelum menyerang (Wind-up)
            this.time.delayedCall(500, () => {
                if (!enemy || !enemy.active) return;

                // 2. Persiapan Animasi Tebasan (Slash)
                let sudutKePlayer = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
                let sudutDerajat = Phaser.Math.RadToDeg(sudutKePlayer);
                
                let visualSlash = this.add.graphics();
                visualSlash.setDepth(998);

                let efek = { progress: 0, alpha: 1 };

                // 3. Animasi Ayunan (Tween)
                this.tweens.add({
                    targets: efek,
                    progress: 1,
                    alpha: 0,
                    duration: 150, // Durasi ayunan
                    ease: 'Quad.easeOut',
                    onUpdate: () => {
                        visualSlash.clear();
                        visualSlash.lineStyle(6, 0xff0000, efek.alpha);
                        visualSlash.beginPath();
                        
                        // Ayunan 90 derajat (seperempat lingkaran)
                        let startAngle = sudutDerajat - 45 + (efek.progress * 45);
                        let endAngle = sudutDerajat + 45 - ((1 - efek.progress) * 45);
                        
                        visualSlash.arc(enemy.x, enemy.y, 60, 
                            Phaser.Math.DegToRad(startAngle), 
                            Phaser.Math.DegToRad(endAngle), false);
                        visualSlash.strokePath();
                    },
                    onComplete: () => {
                        visualSlash.destroy();
                    }
                });

                // 4. Deteksi Damage (hanya jika player masih di area)
                let jarakKeTarget = Phaser.Math.Distance.Between(player.x, player.y, enemy.x, enemy.y);
                if (jarakKeTarget < 70 && hp > 0) {
                    hp -= enemy.getData('damageSerangan');
                    hpText.setText('HP: ' + hp);
                    
                    isKnockback = true;
                    bikinKnockback(player, enemy, enemy.getData('kekuatanDorong'));
                    this.time.delayedCall(200, () => { isKnockback = false; }, [], this);
                    
                    player.setTint(0xff0000);
                    this.time.delayedCall(150, () => { if(hp > 0) player.clearTint(); }, [], this);
                }

                // 5. Game Over
                if (hp <= 0) {
                    hp = 0;
                    this.physics.pause();
                    this.scene.start('SceneGameOver');
                    return;
                }

                // 6. Jeda pasca serang
                this.time.delayedCall(Phaser.Math.Between(500, 1000), () => {
                    if (enemy && enemy.active) enemy.setData('sedangEksekusiSerangan', false);
                });
            });
        }
    
        prosesSeranganBig(player, enemy) {
            if (!enemy.active || enemy.getData('sedangEksekusiSerangan')) return;
    
            enemy.setData('sedangEksekusiSerangan', true);
            enemy.setData('jumlahSerangan', 0);

            const loopSerangan = () => {
                // 1. CEK JARAK: Jika musuh kabur (jarak > radius), BATALKAN KOMBO
                let jarak = Phaser.Math.Distance.Between(player.x, player.y, enemy.x, enemy.y);
                let batasSerang = enemy.getData('radiusSerang');
                
                if (jarak > batasSerang || !enemy.active) {
                    enemy.setData('sedangEksekusiSerangan', false);
                    return; // Kombo batal, dia akan kembali ke AI utama untuk mengejar
                }

                // 2. CEK LIMIT KOMBO: Jika sudah 3x, berhenti
                if (enemy.getData('jumlahSerangan') >= 3) {
                    enemy.setData('sedangEksekusiSerangan', false);
                    return;
                }

                enemy.setVelocity(0);
                
                // Jeda wind-up (0.5 detik)
                enemy.scene.time.delayedCall(500, () => {
                    if (!enemy.active) return;

                    let sudutKePlayer = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
                    let sudutDerajat = Phaser.Math.RadToDeg(sudutKePlayer);
                    
                    // Efek visual seperempat lingkaran
                    let visualSlash = enemy.scene.add.graphics();
                    visualSlash.setDepth(998);
                    let efek = { progress: 0, alpha: 1 };

                    enemy.scene.tweens.add({
                        targets: efek,
                        progress: 1,
                        alpha: 0,
                        duration: 150,
                        ease: 'Quad.easeOut',
                        onUpdate: () => {
                            visualSlash.clear();
                            visualSlash.lineStyle(8, 0xff0000, efek.alpha); // Lebih tebal karena musuh Big
                            visualSlash.beginPath();
                            
                            let startAngle = sudutDerajat - 45 + (efek.progress * 45);
                            let endAngle = sudutDerajat + 45 - ((1 - efek.progress) * 45);
                            
                            visualSlash.arc(enemy.x, enemy.y, 80, // Radius lebih besar (80)
                                Phaser.Math.DegToRad(startAngle), 
                                Phaser.Math.DegToRad(endAngle), false);
                            visualSlash.strokePath();
                        },
                        onComplete: () => visualSlash.destroy()
                    });

                    // Cek damage ke player
                    let jarak = Phaser.Math.Distance.Between(player.x, player.y, enemy.x, enemy.y);
                    if (jarak < 100 && hp > 0) {
                        hp -= enemy.getData('damageSerangan');
                        hpText.setText('HP: ' + hp);
                        
                        // Cek Game Over
                        if (hp <= 0) {
                            hp = 0;
                            enemy.scene.physics.pause();
                            enemy.scene.scene.start('SceneGameOver');
                            return;
                        }

                        player.setTint(0xff0000);
                        enemy.scene.time.delayedCall(150, () => { if(player.active) player.clearTint(); });
                        bikinKnockback(player, enemy, enemy.getData('kekuatanDorong'));
                    }
                    // Jeda antar serangan 0.5 detik
                    enemy.scene.time.delayedCall(800, () => loopSerangan());
                });
            };

            loopSerangan();
        }
    }

    // --- SCENE 3: GAME OVER SCREEN ---
    class SceneGameOver extends Phaser.Scene {
        constructor() {
            super({ key: 'SceneGameOver' });
        }

        create() {
            const width = this.scale.width;
            const height = this.scale.height;

            this.pilihanIndex = 0;
            this.terakhirPindahMundur = 0; 

            this.add.text(width / 2, height / 2 - 100, 'GAME OVER', {
                fontSize: '48px',
                fill: '#ff0000',
                fontStyle: 'bold',
                fontFamily: 'Arial'
            }).setOrigin(0.5);

            this.add.text(width / 2, height / 2 - 30, 'SKOR AKHIR: ' + skor, {
                fontSize: '24px',
                fill: '#ffffff',
                fontStyle: 'bold',
                fontFamily: 'Arial'
            }).setOrigin(0.5);

            this.tombolUlang = this.add.text(width / 2, height / 2 + 40, 'MULAI ULANG', {
                fontSize: '20px',
                fill: '#00ffff',
                fontStyle: 'bold',
                fontFamily: 'Arial',
                backgroundColor: '#333333',
                padding: { x: 15, y: 8 }
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });

            this.tombolMenu = this.add.text(width / 2, height / 2 + 100, 'KEMBALI KE MENU', {
                fontSize: '20px',
                fill: '#ffffff',
                fontStyle: 'bold',
                fontFamily: 'Arial',
                backgroundColor: '#333333',
                padding: { x: 15, y: 8 }
            }).setOrigin(0.5).setInteractive({ useHandCursor: true });

            // Event Mouse
            this.tombolUlang.on('pointerover', () => { this.pilihanIndex = 0; this.updateVisualTombol(); });
            this.tombolUlang.on('pointerdown', () => this.scene.start('SceneGame'));

            this.tombolMenu.on('pointerover', () => { this.pilihanIndex = 1; this.updateVisualTombol(); });
            this.tombolMenu.on('pointerdown', () => this.scene.start('SceneMenu'));

            // --- LISTEN TOMBOL STIK (HANYA SATU BLOK SAJA, BERSIHKAN LISTENER SEBELUM PINDAH) ---
            this.input.gamepad.on('down', (pad, button) => {
                if (button.index === 1) { // Tombol B
                    this.input.gamepad.removeAllListeners(); // Hapus listener saat ini agar tidak bocor ke scene tujuan
                    if (this.pilihanIndex === 0) {
                        this.scene.start('SceneGame');
                    } else if (this.pilihanIndex === 1) {
                        this.scene.start('SceneMenu');
                    }
                }
            });

            this.events.once('shutdown', () => {
                this.input.gamepad.removeAllListeners();
            });

            this.updateVisualTombol();
        }

        updateVisualTombol() {
            if (this.pilihanIndex === 0) {
                this.tombolUlang.setStyle({ fill: '#ffffff', backgroundColor: '#00ffff' });
                this.tombolMenu.setStyle({ fill: '#ffffff', backgroundColor: '#333333' });
            } else {
                this.tombolUlang.setStyle({ fill: '#00ffff', backgroundColor: '#333333' });
                this.tombolMenu.setStyle({ fill: '#333333', backgroundColor: '#ffffff' });
            }
        }

        update(time) {
            let pad = this.input.gamepad.total ? this.input.gamepad.getPad(0) : null;
            if (!pad) return;

            let analogKananY = pad.axes[3].value;
            const AMBANG_BATAS = 0.5;

            // Logika navigasi naik turun menggunakan analog tetap di update
            if (time > this.terakhirPindahMundur) {
                if (analogKananY > AMBANG_BATAS) {
                    this.pilihanIndex = 1;
                    this.updateVisualTombol();
                    this.terakhirPindahMundur = time + 250;
                } else if (analogKananY < -AMBANG_BATAS) {
                    this.pilihanIndex = 0;
                    this.updateVisualTombol();
                    this.terakhirPindahMundur = time + 250;
                }
            }
            // Logika pengecekan tombol B di update() DIHAPUS TOTAL agar tidak bentrok
        }
    }
